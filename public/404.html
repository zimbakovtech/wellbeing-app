<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youth Wellbeing</title>
    <!--
      SPA fallback for GitHub Pages. Stores the requested deep-link path and
      redirects to the app root, where index.html restores it via history API.
    -->
    <script>
      sessionStorage.redirect = location.href;
      location.replace(location.origin + location.pathname.split('/').slice(0, 1).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
